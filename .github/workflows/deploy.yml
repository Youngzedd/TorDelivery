name: Deploy tordelivery.com

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: powershell
        run: |
          $keyPath = "${{ runner.temp }}\id_ed25519"
          Set-Content -Path $keyPath -Value "${{ secrets.SSH_PRIVATE_KEY }}" -NoNewline
          icacls $keyPath /inheritance:r
          icacls $keyPath /grant:r "*S-1-5-32-544:F"
          icacls $keyPath /grant:r "SYSTEM:F"

      - name: Add known host
        shell: powershell
        run: |
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} | Out-File -FilePath "${{ runner.temp }}\known_hosts" -Encoding ascii

      - name: Deploy via SCP
        shell: powershell
        run: |
          scp -r -i "${{ runner.temp }}\id_ed25519" -o "UserKnownHostsFile=${{ runner.temp }}\known_hosts" -P ${{ secrets.SSH_PORT }} `
            .\* `
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/